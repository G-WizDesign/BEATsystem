<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Screen - BEAT System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.typekit.net/poq6vwf.css">
    <link rel="stylesheet" href="https://use.typekit.net/poq6vwf.css">
    <link rel="stylesheet" href="https://use.typekit.net/poq6vwf.css">
</head>
<body>
    <div class="top-controls">
        <a class="nav-link-button" href="index.html" target="_blank" rel="noopener noreferrer">
            <span class="nav-link-icon">🎲</span>
            <span class="nav-link-text">Dice Roller</span>
        </a>
        <button class="theme-toggle" id="theme-toggle">
            <span class="theme-toggle-icon">🌙</span>
            <span class="theme-toggle-text">Dark Mode</span>
        </button>
    </div>

    <div class="container gm-screen-container">
        <header>
            <h1 class="title">BEAT System GM Screen</h1>
        </header>

        <main class="gm-screen-layout">
            <section class="gm-panel">
                <h2>BEAT Tracker</h2>
                <div class="beat-controls">
                    <form id="character-form" class="beat-control-group">
                        <label for="character-name">Character</label>
                        <input id="character-name" type="text" maxlength="30" placeholder="Name" required>
                        <input id="character-color" type="color" value="#b59e90" aria-label="Character color">
                        <button type="submit" class="gm-action-button">Add Character</button>
                    </form>

                    <div class="beat-control-group">
                        <label for="active-character">Active Focus</label>
                        <select id="active-character"></select>
                        <button id="active-focus-chip" type="button" class="character-chip" aria-label="Cycle active focus"></button>
                        <button id="add-beat" type="button" class="gm-action-button">Add BEAT</button>
                    </div>

                    <div class="beat-control-group">
                        <select id="interjection-character"></select>
                        <button id="interjection-chip" type="button" class="character-chip" aria-label="Cycle interjection source"></button>
                        <button id="add-interjection" type="button" class="gm-action-button">Add INTERJECTION</button>
                    </div>
                </div>

                <div class="tracker-shell">
                    <div id="tracker-status" class="tracker-status">Add characters to begin tracking focus and beats.</div>
                    <div class="round-controls in-shell">
                        <button id="start-new-round" type="button" class="gm-action-button round-prominent">
                            <span class="round-plus">＋</span>
                            <span>Start New Round</span>
                        </button>
                        <button id="remove-last-round" type="button" class="gm-action-button">Remove Last Round</button>
                    </div>
                    <svg id="beat-tracker-svg" class="beat-tracker-svg" role="img" aria-label="BEAT tracker timeline"></svg>
                </div>

                <div id="character-legend" class="character-legend" aria-label="Character color legend"></div>

                <div class="initiative-track-controls" aria-label="Initiative track controls">
                    <div id="initiative-track-panels" class="initiative-track-panels" aria-label="Initiative tracks"></div>
                    <button id="add-initiative-track" type="button" class="gm-action-button">New Initiative Track</button>
                    <button id="clear-initiative-track" type="button" class="gm-action-button">Clear Current Track</button>
                    <button id="delete-initiative-track" type="button" class="gm-action-button">Delete Current Track</button>
                </div>

                <div id="interjection-modal" class="modal-overlay" aria-hidden="true">
                    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="interjection-modal-title">
                        <h3 id="interjection-modal-title">Add INTERJECTION BEAT</h3>
                        <p id="interjection-modal-subtitle" class="modal-subtitle"></p>
                        <div id="interjection-options" class="interjection-options"></div>
                        <button id="close-interjection-modal" type="button" class="gm-action-button">Cancel</button>
                    </div>
                </div>

                <div id="focus-change-modal" class="modal-overlay" aria-hidden="true">
                    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="focus-change-title">
                        <h3 id="focus-change-title">Change Focus?</h3>
                        <p id="focus-change-subtitle" class="modal-subtitle"></p>
                        <div class="focus-change-actions">
                            <button id="confirm-focus-change" type="button" class="gm-action-button">Yes, Change Focus</button>
                            <button id="cancel-focus-change" type="button" class="gm-action-button">Cancel</button>
                        </div>
                    </div>
                </div>

                <div id="character-action-modal" class="modal-overlay" aria-hidden="true">
                    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="character-action-title">
                        <h3 id="character-action-title">Character Action</h3>
                        <p id="character-action-subtitle" class="modal-subtitle"></p>
                        <div class="character-action-actions">
                            <button id="confirm-remove-character" type="button" class="gm-action-button">Remove Character</button>
                            <button id="confirm-defeat-character" type="button" class="gm-action-button">Mark Defeated</button>
                            <button id="cancel-character-action" type="button" class="gm-action-button">Cancel</button>
                        </div>
                    </div>
                </div>

            </section>

            <section class="gm-panel">
                <h2>Minion Groups</h2>
                <div class="minion-groups-panel">
                    <form id="minion-group-form" class="minion-create-form">
                        <input id="minion-group-name" type="text" maxlength="40" placeholder="Minion Group Name" required>
                        <select id="minion-group-size" required>
                            <option value="handful">Handful (d4)</option>
                            <option value="small-group">Small Group (d6)</option>
                            <option value="mob">Mob (d8)</option>
                            <option value="unit">Unit (d10)</option>
                            <option value="large-unit">Large Unit (d12)</option>
                            <option value="horde">Horde (d20)</option>
                        </select>
                        <button type="submit" class="gm-action-button">Add Minion Group</button>
                    </form>

                    <div id="minion-groups-empty" class="gm-placeholder-text">No minion groups yet.</div>
                    <div id="minion-groups-list" class="minion-groups-list" aria-label="Minion group cards"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="minion-initiative-modal" class="modal-overlay" aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="minion-initiative-title">
            <h3 id="minion-initiative-title">Add Minion Group to Initiative</h3>
            <p id="minion-initiative-subtitle" class="modal-subtitle">Choose which initiative panel to add this group to.</p>
            <div id="minion-initiative-options" class="interjection-options"></div>
            <button id="close-minion-initiative-modal" type="button" class="gm-action-button">Cancel</button>
        </div>
    </div>

    <script src="gm-screen.js"></script>
</body>
</html>
